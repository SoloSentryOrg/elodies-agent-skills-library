name: Repository Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: repository-security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repository-security:
    name: Repository Security Gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate repository and skills
        run: ruby scripts/validate_repository.rb

      - name: Validate lessons-learned evidence
        if: github.event_name == 'pull_request'
        env:
          GITHUB_EVENT_PATH: ${{ github.event_path }}
        run: python3 scripts/check-lessons-evidence.py
